<!-- Gmail Monitor Feature Window -->
<div class="gmail-content">
    <div class="gmail-header">
        <div class="gmail-title">Gmail</div>
        <div class="gmail-controls">
            <input type="text" id="gmail-search" class="gmail-search" placeholder="Search emails...">
        </div>
    </div>
    <div class="gmail-list" id="gmail-list">
        <div class="list-placeholder">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="opacity: 0.3;">
                <rect x="2" y="4" width="20" height="16" rx="2"></rect>
                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
            </svg>
            <p>No emails</p>
        </div>
        <button class="play-pause-btn" id="gmail-play-pause-btn" title="Play/Pause">
            <svg class="play-icon" viewBox="0 0 24 24" fill="currentColor">
                <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
            <svg class="pause-icon" viewBox="0 0 24 24" fill="currentColor" style="display:none;">
                <rect x="6" y="4" width="4" height="16"></rect>
                <rect x="14" y="4" width="4" height="16"></rect>
            </svg>
        </button>
    </div>
</div>
