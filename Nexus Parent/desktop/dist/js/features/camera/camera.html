<!-- Camera Monitor Feature Window -->
<div class="camera-content">
    <div class="camera-header">
        <div class="camera-status">
            <span class="status-indicator"></span>
            <span class="status-text">Camera Feed</span>
        </div>
        <div class="camera-controls">
            <div class="record-wrap">
                <button class="camera-btn record-btn" id="camera-record-btn" title="Record">
                    <svg class="record-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="12" r="8" fill="currentColor" />
                    </svg>
                </button>
                <div class="record-menu" id="camera-record-menu">
                    <button class="record-menu-btn video-only-btn" id="camera-video-only-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polygon points="23 7 16 12 23 17 23 7"></polygon>
                            <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
                        </svg>
                        <span>Video only</span>
                    </button>
                    <button class="record-menu-btn both-btn" id="camera-both-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M23 7l-7 5 7 5V7z"></path>
                            <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
                            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" transform="translate(0, 8) scale(0.5)"></path>
                        </svg>
                        <span>Video & Audio</span>
                    </button>
                </div>
                <div class="record-timer" id="camera-record-timer">00:00</div>
            </div>
        </div>
    </div>
    <div class="camera-stream" id="camera-stream">
        <div class="stream-placeholder">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="opacity: 0.3;">
                <polygon points="23 7 16 12 23 17 23 7"></polygon>
                <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
            </svg>
            <p>Click play button to start camera</p>
        </div>
        <!-- Bottom Right Controls -->
        <div class="stream-controls">
            <button class="stream-control-btn" id="camera-play-pause-btn" title="Start/Stop Camera">
                <svg class="play-icon" viewBox="0 0 24 24" fill="currentColor">
                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                </svg>
                <svg class="pause-icon" viewBox="0 0 24 24" fill="currentColor" style="display:none;">
                    <rect x="6" y="4" width="4" height="16"></rect>
                    <rect x="14" y="4" width="4" height="16"></rect>
                </svg>
            </button>
            <button class="stream-control-btn" id="camera-switch-btn" title="Switch Camera">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M20 4h-3.17L15 2H9L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-8 13c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/>
                    <path d="M12 9l-1.5 1.5h3z"/>
                </svg>
            </button>
            <button class="stream-control-btn" id="camera-fullscreen-btn" title="Fullscreen">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
                </svg>
            </button>
        </div>
    </div>
</div>
