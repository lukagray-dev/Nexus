<!-- Vibrate and Flash Feature Window -->
<div class="vibrateflash-content">
    <div class="vibrateflash-header">
        <div class="vibrateflash-title">Vibrate & Flash</div>
    </div>
    
    <div class="vibrateflash-grid">
        <!-- Vibration Section -->
        <div class="vibrateflash-section">
            <h4 class="section-title">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 18px; height: 18px; vertical-align: middle; margin-right: 6px;">
                    <path d="M12 2v20M17 7l-5 5-5-5M7 17l5-5 5 5"></path>
                </svg>
                Vibration Patterns
            </h4>
            <div class="button-group">
                <button class="vibrate-btn vf-btn btn-blue" data-pattern="short">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                    Short Buzz
                </button>
                <button class="vibrate-btn vf-btn btn-blue" data-pattern="double">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="8" cy="12" r="2"></circle>
                        <circle cx="16" cy="12" r="2"></circle>
                    </svg>
                    Double Tap
                </button>
                <button class="vibrate-btn vf-btn btn-blue" data-pattern="triple">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="6" cy="12" r="1.5"></circle>
                        <circle cx="12" cy="12" r="1.5"></circle>
                        <circle cx="18" cy="12" r="1.5"></circle>
                    </svg>
                    Triple Tap
                </button>
                <button class="vibrate-btn vf-btn btn-red" data-pattern="sos">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
                    </svg>
                    SOS Pattern
                </button>
                <button class="vibrate-btn vf-btn btn-pink" data-pattern="heartbeat">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                    </svg>
                    Heartbeat
                </button>
                <button class="vibrate-btn vf-btn btn-purple" data-pattern="wave">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M2 12h4l3-9 4 18 3-9h4"></path>
                    </svg>
                    Wave
                </button>
                <button class="vibrate-btn vf-btn btn-orange" data-pattern="earthquake">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M2 12h2l2-4 2 8 2-4 2 4h10"></path>
                    </svg>
                    Earthquake
                </button>
            </div>
        </div>
        
        <!-- Flash Section -->
        <div class="vibrateflash-section">
            <h4 class="section-title">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 18px; height: 18px; vertical-align: middle; margin-right: 6px;">
                    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
                </svg>
                Flash Patterns
            </h4>
            <div class="button-group">
                <button class="flash-btn vf-btn btn-yellow" data-pattern="blink">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    Single Blink
                </button>
                <button class="flash-btn vf-btn btn-yellow" data-pattern="double_blink">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="8" cy="12" r="3"></circle>
                        <circle cx="16" cy="12" r="3"></circle>
                    </svg>
                    Double Blink
                </button>
                <button class="flash-btn vf-btn btn-yellow" data-pattern="strobe">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
                    </svg>
                    Strobe
                </button>
                <button class="flash-btn vf-btn btn-red" data-pattern="sos_flash">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="8" x2="12" y2="12"></line>
                        <line x1="12" y1="16" x2="12.01" y2="16"></line>
                    </svg>
                    SOS Flash
                </button>
                <button class="flash-btn vf-btn btn-pink" data-pattern="pulse">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <circle cx="12" cy="12" r="6"></circle>
                        <circle cx="12" cy="12" r="2"></circle>
                    </svg>
                    Pulse
                </button>
                <button class="flash-btn vf-btn btn-purple" data-pattern="beacon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2v20"></path>
                        <path d="M17 7l-5-5-5 5"></path>
                        <path d="M7 17l5 5 5-5"></path>
                    </svg>
                    Beacon
                </button>
                <button class="flash-btn vf-btn btn-orange" data-pattern="disco">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                    </svg>
                    Disco
                </button>
            </div>
        </div>
    </div>

    <!-- Combined Section -->
    <div class="vibrateflash-combined">
        <h4 class="section-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 18px; height: 18px; vertical-align: middle; margin-right: 6px;">
                <circle cx="12" cy="12" r="10"></circle>
                <polygon points="10 8 16 12 10 16 10 8"></polygon>
            </svg>
            Combined Patterns
        </h4>
        <div class="combined-buttons">
            <button class="combined-btn vf-btn btn-green" data-pattern="alert">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                    <line x1="12" y1="9" x2="12" y2="13"></line>
                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>
                Alert
            </button>
            <button class="combined-btn vf-btn btn-orange" data-pattern="attention">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="8" x2="12" y2="12"></line>
                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                </svg>
                Attention
            </button>
            <button class="combined-btn vf-btn btn-red" data-pattern="emergency">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 12h-4l-3 9L9 3l-3 9H2"></path>
                </svg>
                Emergency
            </button>
        </div>
    </div>
    
    <div id="vibrateflash-status" class="status-message"></div>
</div>
