<!-- App Lock Monitor Feature Window -->
<div class="applock-content">
    <div class="applock-header">
        <div class="applock-title">App Lock Monitor</div>
    </div>
    
    <!-- Stats Bar -->
    <div id="applock-stats" class="stats-bar">
        <div class="stat-item">
            <div class="stat-value">0</div>
            <div class="stat-label">TOTAL</div>
        </div>
        <div class="stat-item success">
            <div class="stat-value">0</div>
            <div class="stat-label">SUCCESSFUL</div>
        </div>
        <div class="stat-item failed">
            <div class="stat-value">0</div>
            <div class="stat-label">FAILED</div>
        </div>
        <div class="stat-item lockout">
            <div class="stat-value">0</div>
            <div class="stat-label">LOCKOUTS</div>
        </div>
    </div>
    
    <!-- Search Bar -->
    <div class="search-container">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="M21 21l-4.35-4.35"></path>
        </svg>
        <input id="applock-search" type="text" class="search-input" placeholder="Search alerts..." />
    </div>
    
    <!-- Alerts List -->
    <div id="applock-list" class="alerts-list">
        <div class="list-placeholder">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="opacity: 0.3;">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            <p>No unlock attempts yet</p>
        </div>
    </div>
    
    <!-- Control Buttons at Bottom -->
    <div class="applock-controls">
        <button id="applock-toggle-btn" class="control-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            <span>Enabled</span>
        </button>
        <button id="applock-change-pin-btn" class="control-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path>
            </svg>
            <span>Change PIN</span>
        </button>
        <button id="applock-refresh-btn" class="control-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/>
            </svg>
            <span>Refresh</span>
        </button>
        <button id="applock-clear-btn" class="control-btn danger">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            </svg>
            <span>Clear All</span>
        </button>
    </div>
    
    <div id="applock-status" class="status-message"></div>
</div>
