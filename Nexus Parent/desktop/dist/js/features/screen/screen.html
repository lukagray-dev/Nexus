<!-- Screen Recording Feature Window -->
<div class="screen-content">
    <div class="screen-header">
        <div class="screen-status">
            <span class="status-indicator"></span>
            <span class="status-text">Screen Recording</span>
        </div>
        <div class="screen-controls">
            <div class="record-wrap">
                <button class="screen-btn record-btn" id="screen-record-btn" title="Record Screen & Audio">
                    <svg class="record-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="12" r="8" fill="currentColor" />
                    </svg>
                </button>
                <div class="record-timer" id="screen-record-timer">00:00</div>
            </div>
        </div>
    </div>
    <div class="screen-stream" id="screen-stream">
        <div class="stream-placeholder">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="opacity: 0.3;">
                <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                <line x1="8" y1="21" x2="16" y2="21"></line>
                <line x1="12" y1="17" x2="12" y2="21"></line>
            </svg>
            <p>Click play button to start screen recording</p>
        </div>
        <!-- Bottom Right Controls -->
        <div class="stream-controls">
            <button class="stream-control-btn" id="screen-play-pause-btn" title="Start/Stop Screen Recording">
                <svg class="play-icon" viewBox="0 0 24 24" fill="currentColor">
                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                </svg>
                <svg class="pause-icon" viewBox="0 0 24 24" fill="currentColor" style="display:none;">
                    <rect x="6" y="4" width="4" height="16"></rect>
                    <rect x="14" y="4" width="4" height="16"></rect>
                </svg>
            </button>
            <button class="stream-control-btn" id="screen-fullscreen-btn" title="Fullscreen">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
                </svg>
            </button>
        </div>
    </div>
</div>
