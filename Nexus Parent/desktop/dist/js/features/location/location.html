<!-- Location Feature Window -->
<div class="location-content">
    <div class="location-header">
        <div class="location-title">Location Tracking</div>
        <div class="location-info">
            <div class="location-info-item">
                <span class="location-info-label">Location:</span>
                <span class="location-info-value" id="location-name">Waiting...</span>
            </div>
            <div class="location-info-item">
                <span class="location-info-label">Coords:</span>
                <span class="location-info-value" id="location-coords">--</span>
            </div>
        </div>
    </div>
    <div class="location-map-container" id="location-map-container">
        <div id="location-map"></div>
        <button class="play-pause-btn" id="location-play-pause-btn" title="Start/Stop Tracking">
            <svg class="play-icon" viewBox="0 0 24 24" fill="currentColor">
                <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
            <svg class="pause-icon" viewBox="0 0 24 24" fill="currentColor" style="display:none;">
                <rect x="6" y="4" width="4" height="16"></rect>
                <rect x="14" y="4" width="4" height="16"></rect>
            </svg>
        </button>
    </div>
</div>
