<!-- Notifications Monitor Feature Window -->
<div class="notifications-content">
    <div class="notifications-header">
        <div class="notifications-title">Notifications</div>
        <div class="notifications-controls">
            <input type="text" id="notifications-search" class="notifications-search" placeholder="Search...">
        </div>
    </div>
    <div class="notifications-list" id="notifications-list">
        <div class="list-placeholder">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="opacity: 0.3;">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
            </svg>
            <p>No notifications</p>
        </div>
        <button class="play-pause-btn" id="notifications-play-pause-btn" title="Play/Pause">
            <svg class="play-icon" viewBox="0 0 24 24" fill="currentColor">
                <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
            <svg class="pause-icon" viewBox="0 0 24 24" fill="currentColor" style="display:none;">
                <rect x="6" y="4" width="4" height="16"></rect>
                <rect x="14" y="4" width="4" height="16"></rect>
            </svg>
        </button>
    </div>
</div>
