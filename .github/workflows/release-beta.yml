name: Build and Release Beta

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare-version:
    name: Calculate Next Beta Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.next_version.outputs.version }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest beta tag
        id: latest_tag
        run: |
          # Get all beta tags sorted
          LATEST=$(git tag -l "v*-beta" | sort -V | tail -n 1)
          
          if [ -z "$LATEST" ]; then
            echo "No previous beta tags found"
            echo "tag=v0.0.0-beta" >> $GITHUB_OUTPUT
          else
            echo "Latest beta tag: $LATEST"
            echo "tag=$LATEST" >> $GITHUB_OUTPUT
          fi

      - name: Calculate next version
        id: next_version
        run: |
          LATEST="${{ steps.latest_tag.outputs.tag }}"
          
          # Extract version number (e.g., v0.0.1-beta -> 0.0.1)
          VERSION=$(echo "$LATEST" | sed 's/v\(.*\)-beta/\1/')
          
          # Split into major.minor.patch
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          
          # Increment patch version
          PATCH=$((PATCH + 1))
          
          # Create new version
          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}-beta"
          
          echo "Next version: $NEW_VERSION"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

  build-child-android:
    name: Build Child Android
    runs-on: ubuntu-latest
    needs: prepare-version
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install SDK packages
        run: |
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Build Child Android APK
        working-directory: Nexus Child/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Rename APK
        run: |
          VERSION="${{ needs.prepare-version.outputs.version }}"
          cp "Nexus Child/android/app/build/outputs/apk/release/app-release-unsigned.apk" \
             "child-android-${VERSION}.apk"

      - name: Upload Child APK
        uses: actions/upload-artifact@v4
        with:
          name: child-android
          path: child-android-*.apk

  build-parent-android:
    name: Build Parent Android
    runs-on: ubuntu-latest
    needs: prepare-version
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install SDK packages
        run: |
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Build Parent Android APK
        working-directory: Nexus Parent/mobile/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Rename APK
        run: |
          VERSION="${{ needs.prepare-version.outputs.version }}"
          cp "Nexus Parent/mobile/android/app/build/outputs/apk/release/app-release-unsigned.apk" \
             "parent-android-${VERSION}.apk"

      - name: Upload Parent APK
        uses: actions/upload-artifact@v4
        with:
          name: parent-android
          path: parent-android-*.apk

  build-parent-windows:
    name: Build Parent Windows
    runs-on: windows-latest
    needs: prepare-version
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Nexus Parent/desktop/package-lock.json

      - name: Install dependencies
        working-directory: Nexus Parent/desktop
        run: npm ci

      - name: Build Windows Portable
        working-directory: Nexus Parent/desktop
        run: npm run build:win

      - name: Rename executable
        shell: pwsh
        run: |
          $VERSION = "${{ needs.prepare-version.outputs.version }}"
          $SetupExe = Get-ChildItem "Nexus Parent/desktop/release" -Filter "*setup*.exe" | Select-Object -First 1
          if ($SetupExe) {
            Copy-Item $SetupExe.FullName -Destination "parent-windows-$VERSION-setup.exe"
            Write-Host "Created: parent-windows-$VERSION-setup.exe"
          } else {
            Write-Error "No setup executable found in release directory"
            exit 1
          }

      - name: Upload Windows Executable
        uses: actions/upload-artifact@v4
        with:
          name: parent-windows
          path: parent-windows-*.exe

  create-release:
    name: Create Pre-Release
    runs-on: ubuntu-latest
    needs: [prepare-version, build-child-android, build-parent-android, build-parent-windows]
    if: always() && needs.prepare-version.result == 'success'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
        continue-on-error: true

      - name: Display artifact structure
        run: ls -R artifacts/ || echo "No artifacts found"

      - name: Check which builds succeeded
        id: check_builds
        run: |
          CHILD_STATUS="${{ needs.build-child-android.result }}"
          PARENT_STATUS="${{ needs.build-parent-android.result }}"
          DESKTOP_STATUS="${{ needs.build-parent-windows.result }}"
          
          echo "child=$CHILD_STATUS" >> $GITHUB_OUTPUT
          echo "parent=$PARENT_STATUS" >> $GITHUB_OUTPUT
          echo "desktop=$DESKTOP_STATUS" >> $GITHUB_OUTPUT
          
          # Check if at least one build succeeded
          if [ "$CHILD_STATUS" == "success" ] || [ "$PARENT_STATUS" == "success" ] || [ "$DESKTOP_STATUS" == "success" ]; then
            echo "has_artifacts=true" >> $GITHUB_OUTPUT
          else
            echo "has_artifacts=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release Body
        id: release_body
        run: |
          VERSION="${{ needs.prepare-version.outputs.version }}"
          
          cat > release_body.md << 'EOF'
          ## Nexus Beta Release ${{ needs.prepare-version.outputs.version }}
          
          **Automated pre-release build from main branch**
          
          ### Downloads
          EOF
          
          if [ "${{ steps.check_builds.outputs.child }}" == "success" ]; then
            echo "- ✅ **Child Android**: \`child-android-${VERSION}.apk\`" >> release_body.md
          else
            echo "- ❌ **Child Android**: Build failed" >> release_body.md
          fi
          
          if [ "${{ steps.check_builds.outputs.parent }}" == "success" ]; then
            echo "- ✅ **Parent Android**: \`parent-android-${VERSION}.apk\`" >> release_body.md
          else
            echo "- ❌ **Parent Android**: Build failed" >> release_body.md
          fi
          
          if [ "${{ steps.check_builds.outputs.desktop }}" == "success" ]; then
            echo "- ✅ **Parent Windows**: \`parent-windows-${VERSION}-setup.exe\` (Installer)" >> release_body.md
          else
            echo "- ❌ **Parent Windows**: Build failed" >> release_body.md
          fi
          
          cat >> release_body.md << 'EOF'
          
          ### Installation
          - **Android**: Enable "Install from unknown sources" and install the APK
          - **Windows**: Run the installer and follow the setup wizard
          
          ---
          *This is a pre-release beta build. Report issues on GitHub.*
          EOF

      - name: Create Release
        if: steps.check_builds.outputs.has_artifacts == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare-version.outputs.version }}
          name: ${{ needs.prepare-version.outputs.version }}
          body_path: release_body.md
          prerelease: true
          draft: false
          files: |
            artifacts/child-android/*.apk
            artifacts/parent-android/*.apk
            artifacts/parent-windows/*.exe
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: No artifacts to release
        if: steps.check_builds.outputs.has_artifacts == 'false'
        run: |
          echo "⚠️ All builds failed. No release will be created."
          exit 1
