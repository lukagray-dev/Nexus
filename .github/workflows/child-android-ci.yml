name: Child Android CI

on:
  push:
    branches: ["main", "develop"]
    paths:
      - "Nexus Child/android/**"
      - ".github/workflows/child-android-ci.yml"
  pull_request:
    paths:
      - "Nexus Child/android/**"
      - ".github/workflows/child-android-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: child-android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit Tests (JDK 21)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Nexus Child/android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Run debug unit tests
        env:
          ANDROID_USER_HOME: ${{ github.workspace }}/.android-user-home
          GRADLE_USER_HOME: ${{ github.workspace }}/.gradle-user-home
        run: ./gradlew testDebugUnitTest --no-daemon --stacktrace

      - name: Build debug APK
        env:
          ANDROID_USER_HOME: ${{ github.workspace }}/.android-user-home
          GRADLE_USER_HOME: ${{ github.workspace }}/.gradle-user-home
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload test reports (if failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: child-android-test-reports
          path: |
            Nexus Child/android/app/build/reports/tests/
            Nexus Child/android/app/build/test-results/
