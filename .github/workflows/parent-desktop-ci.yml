name: Parent Desktop CI

on:
  push:
    branches: ["main", "develop"]
    paths:
      - "Nexus Parent/desktop/**"
      - ".github/workflows/parent-desktop-ci.yml"
  pull_request:
    paths:
      - "Nexus Parent/desktop/**"
      - ".github/workflows/parent-desktop-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: parent-desktop-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Nexus Parent/desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Nexus Parent/desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --run
